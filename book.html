<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>کتاب‌های خواندنی | مکتب خرد</title>
    <link rel="stylesheet" href="fonts/Vazirmatn.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/books.css" />
    <link rel="stylesheet" href="css/animation.css" />
</head>
<body>

    <!-- هدر مشابه index.html -->
    <header class="header" id="header">
        <div class="container header-container">
            <div class="logo">
                <img src="images/logo.png" alt="مکتب خرد" class="logo-img" />
                <span class="logo-text">مکتب خرد</span>
            </div>
            <div class="header-buttons">
                <a href="https://t.me/Maktabe_Kherad" target="_blank" class="btn-glass">عضویت در کانال</a>
                <a href="https://t.me/Maziar_Meidani" target="_blank" class="btn-glass">ارتباط با ما</a>
            </div>
        </div>
    </header>

    <main class="books-page">
        <div class="container">
            <h1 class="page-title">کتاب‌های خواندنی</h1>

            <!-- فیلتر و جستجو -->
            <div class="books-toolbar">
                <input type="text" id="searchBooks" placeholder="جستجوی کتاب..." class="search-input" />
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">همه</button>
                    <button class="filter-btn" data-filter="dastan">داستان</button>
                    <button class="filter-btn" data-filter="she'r">شعر</button>
                    <button class="filter-btn" data-filter="maghale">مقاله</button>
                </div>
            </div>

            <!-- شبکه کتاب‌ها -->
            <div class="books-grid" id="booksGrid">
                <!-- کارت‌های کتاب توسط JS تولید می‌شوند -->
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; ۱۴۰۵ مکتب خرد - تمامی حقوق محفوظ است.</p>
        </div>
    </footer>

    <script src="js/scroll.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
