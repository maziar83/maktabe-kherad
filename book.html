<!DOCTYPE html>

    <meta charset="UTF-8" />

    <style>
        .books-page {
            padding-top: 120px;
            padding-bottom: 80px;
            min-height: 100vh;
        }
        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--color-gold);
            text-align: center;
            margin-bottom: 40px;
        }
        .books-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: rgba(60, 45, 35, 0.15);
            padding: 20px 30px;
            border-radius: 16px;
            border: 1px solid rgba(201, 168, 124, 0.08);
        }
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(201, 168, 124, 0.15);
            border-radius: 50px;
            color: var(--color-text);
            font-family: var(--font-primary);
            font-size: 1rem;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--color-gold);
        }
        .search-input::placeholder {
            color: var(--color-text);
            opacity: 0.4;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid rgba(201, 168, 124, 0.2);
            border-radius: 50px;
            color: var(--color-text);
            font-family: var(--font-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: none;
        }
        .filter-btn:hover {
            background: rgba(201, 168, 124, 0.1);
        }
        .filter-btn.active {
            background: var(--color-gold);
            color: var(--color-bg);
            border-color: var(--color-gold);
        }
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .book-item {
            background: var(--color-card);
            border-radius: 10px;
            padding: 18px 16px;
            cursor: pointer;
            border: 1px solid rgba(201, 168, 124, 0.08);
            transition: none;
            text-align: center;
        }
        .book-item:hover {
            background: var(--color-surface);
            border-color: rgba(201, 168, 124, 0.2);
        }
        .book-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-cream);
            margin-bottom: 4px;
        }
        .book-category {
            font-size: 0.8rem;
            color: var(--color-gold-light);
            opacity: 0.6;
        }

        /* دکمه بازگشت به منو */
        .back-to-menu {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(201, 168, 124, 0.12) !important;
            border: 1px solid rgba(201, 168, 124, 0.2) !important;
            color: var(--color-gold-light) !important;
            padding: 8px 18px !important;
            border-radius: 50px !important;
            font-family: var(--font-primary) !important;
            font-size: 0.9rem !important;
            text-decoration: none !important;
            transition: none !important;
            cursor: pointer;
            margin-left: 8px;
        }
        .back-to-menu:hover {
            background: rgba(201, 168, 124, 0.25) !important;
            border-color: var(--color-gold) !important;
            color: var(--color-gold) !important;
        }
        .back-to-menu .arrow {
            display: inline-block;
            font-size: 1.1rem;
            line-height: 1;
        }

        /* ترتیب دکمه‌های هدر */
        .header-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .books-toolbar {
                flex-direction: column;
                align-items: stretch;
                padding: 15px;
            }
            .filter-buttons {
                justify-content: center;
            }
            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            .book-item {
                padding: 14px 12px;
            }
            .book-title {
                font-size: 0.9rem;
            }
            .back-to-menu {
                font-size: 0.8rem !important;
                padding: 6px 14px !important;
            }
            .header-buttons {
                gap: 6px;
            }
        }
        @media (max-width: 480px) {
            .books-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .book-item {
                padding: 12px 8px;
            }
            .book-title {
                font-size: 0.8rem;
            }
            .page-title {
                font-size: 1.8rem;
            }
            .back-to-menu {
                font-size: 0.75rem !important;
                padding: 5px 10px !important;
            }
            .header-buttons .btn-glass {
                font-size: 0.75rem !important;
                padding: 5px 10px !important;
            }

                if (filtered.length === 0) {
                    booksGrid.innerHTML =
                        `<p style="color:var(--color-gold-light); text-align:center; padding:40px; font-size:1.2rem;">هیچ کتابی یافت نشد.</p>`;
                    return;
                }

                filtered.forEach(book => {
                    const item = document.createElement('div');
                    item.className = 'book-item';
                    item.dataset.book = book.id;
                    item.innerHTML = `
                            <div class="book-title">${book.title}</div>
                            <div class="book-category">${getCategoryName(book.category)}</div>
                        `;
                    item.addEventListener('click', function(e) {
                        const bookId = this.dataset.book;
                        if (bookId) {
                            window.location.href = `books/${bookId}.html`;
                        }
                    });
                    booksGrid.appendChild(item);
                });
            }

            // رویدادهای فیلتر
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const filter = this.dataset.filter;
                    renderBooks(filter, searchInput.value);
                });
            });

            // رویداد جستجو
            let searchTimeout;
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const activeFilter = document.querySelector('.filter-btn.active');
                    const filter = activeFilter ? activeFilter.dataset.filter : 'all';
                    renderBooks(filter, this.value);
                }, 300);
            });

            // رندر اولیه
            renderBooks('all', '');

            console.log('📚 صفحه کتاب‌های خواندنی با ۱۴۸ کتاب بارگذاری شد.');

        });
    </script>

</body>
</html>
